<!DOCTYPE html>
<html lang="en" class="theme-classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Silly Chess - Play chess against AI or a friend, with adjustable difficulty">
  <title>Silly Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app-root" class="theme-classic">
    <header class="topbar">
      <div class="title">
        <span class="title-mark" aria-hidden="true">
          <img src="/pieces/wN.svg" alt="" />
        </span>
        <span>Silly Chess</span>
      </div>

      <div id="status-pill" class="status-pill">
        <span id="status-container" class="turn">Initializing...</span>
      </div>

      <div class="topbar-right">
        <div id="difficulty-display" class="status-pill" aria-live="polite"></div>
        <div class="seg small" role="group" aria-label="Board theme">
          <button type="button" data-theme="classic" class="on">Classic</button>
          <button type="button" data-theme="minimal">Minimal</button>
          <button type="button" data-theme="dark">Dusk</button>
        </div>
      </div>
    </header>

    <main class="main-grid">
      <aside class="side left">
        <div id="move-list-container" class="panel moves"></div>
        <div id="analysis-container"></div>
      </aside>

      <section class="board-area">
        <div id="player-bar-top" class="player-bar" aria-label="Opponent"></div>

        <div class="board-row">
          <div id="eval-bar-container" aria-label="Position evaluation"></div>
          <div class="board-wrap">
            <div id="board-container">
              <div class="loading">Loading</div>
            </div>
          </div>
        </div>

        <div id="player-bar-bottom" class="player-bar" aria-label="You"></div>

        <div id="explanation-container" class="explanation-area" aria-live="polite"></div>
      </section>

      <aside class="side right">
        <div id="controls-container"></div>
        <div id="tactics-container"></div>
      </aside>
    </main>

    <footer class="footer">
      <p>
        Powered by <a href="https://github.com/jhlywa/chess.js" target="_blank" rel="noopener">chess.js</a> and
        <a href="https://github.com/official-stockfish/Stockfish" target="_blank" rel="noopener">Stockfish</a>.
        Chess pieces by Cburnett, <a href="https://commons.wikimedia.org/wiki/Category:PNG_chess_pieces/Standard_transparent" target="_blank" rel="noopener">Wikimedia Commons</a>,
        <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank" rel="noopener">CC-BY-SA 3.0</a>.
      </p>
    </footer>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
